<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>randoomRGB</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="alternate" type="application/rss+xml" title="randoomRGB" href="/feed.xml" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="toolbar">
      <div class="brand">
        <h1>randoomRGB</h1>
        <div class="info-popover">
          <button
            type="button"
            id="infoToggle"
            class="info-btn"
            aria-label="Creator info"
            aria-expanded="false"
            aria-controls="infoPanel"
          >
            i
          </button>
          <div id="infoPanel" class="info-panel" hidden>
            <p>Creator email: <a href="mailto:korinek.gergely@gmail.com">korinek.gergely@gmail.com</a></p>
            <button type="button" id="infoClose" class="info-close">Close</button>
          </div>
        </div>
        <a class="rss-link" href="/feed.xml">RSS feed</a>
      </div>
      <div class="filter-group">
        <span class="filter-group-label">Filter</span>
        <form class="filters" id="filterForm">
        <label class="filter-field">
          <span>Date</span>
          <input id="filterDate" type="date" lang="en-GB" placeholder="YYYY-MM-DD" title="YYYY-MM-DD" />
        </label>
        <label class="filter-field">
          <span>Hex</span>
          <input id="filterHex" type="text" maxlength="7" placeholder="#RRGGBB" />
        </label>
        <label class="filter-field">
          <span>Name</span>
          <input id="filterName" type="text" maxlength="40" placeholder="Liker name" />
        </label>
        <button type="button" id="filterClear" class="panel-clear" hidden>Clear</button>
        <p class="filter-message" id="filterMessage" hidden></p>
        </form>
      </div>
      <div class="sort-group">
        <label class="sort-field" for="sortSelect">
          <span>Sort</span>
          <select id="sortSelect" class="sort-select" aria-label="Sort colors">
            <option value="date-desc">Date, newest</option>
            <option value="date-asc">Date, oldest</option>
            <option value="hex-asc">Hex, A→Z</option>
            <option value="hex-desc">Hex, Z→A</option>
            <option value="likes-desc">Likes, most</option>
            <option value="likes-asc">Likes, fewest</option>
          </select>
        </label>
        <button type="button" id="sortClear" class="panel-clear" hidden>Clear</button>
      </div>
      <label class="size-control">
        <span>Cell size</span>
        <input id="sizeSlider" type="range" min="20" max="280" value="120" />
      </label>
      <button type="button" id="labelsToggle" class="labels-toggle" aria-pressed="false">
        Hide labels
      </button>
    </header>
    <main id="wall" class="wall" aria-live="polite"></main>
    <button
      type="button"
      id="colorImmersive"
      class="color-immersive"
      hidden
      aria-label="Return to grid"
    ></button>
    <template id="tileTemplate">
      <article class="tile" data-color-date="">
        <div class="swatch">
          <span class="swatch-hex" aria-hidden="true">
            <span class="swatch-hex-white"></span>
            <span class="swatch-hex-black"></span>
          </span>
        </div>
        <div class="meta">
          <div class="hex-row">
            <p class="hex"></p>
            <div class="hex-actions">
              <button type="button" class="copy-hex-btn" aria-label="Copy hex">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <rect x="9" y="9" width="13" height="13" rx="2" />
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                </svg>
              </button>
              <button type="button" class="share-color-btn" aria-label="Share color">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <circle cx="18" cy="5" r="3" />
                  <circle cx="6" cy="12" r="3" />
                  <circle cx="18" cy="19" r="3" />
                  <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
                  <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
                </svg>
              </button>
            </div>
          </div>
          <p class="date"></p>
          <p class="likes"></p>
          <form class="like-form">
            <input type="text" name="name" maxlength="40" placeholder="Your name (optional)" />
            <button type="submit">Like</button>
          </form>
          <button type="button" class="unlike-btn" hidden>Unlike</button>
          <p class="like-error" hidden></p>
        </div>
      </article>
    </template>
    <script src="/app.js"></script>
  </body>
</html>
